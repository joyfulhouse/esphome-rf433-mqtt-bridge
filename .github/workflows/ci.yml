name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Native firmware + package contract tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Test
        run: uv run pytest -q

  esphome-compile:
    name: ESPHome firmware compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Compile example firmware
        # The install instructions place the package, both headers, local
        # component, and per-device YAML in one directory; mirror that layout
        # (ESPHome resolves `includes:` relative to the device YAML).
        run: |
          cp secrets.example.yaml secrets.yaml
          cp examples/living-room.yaml .
          uvx --from "esphome==2026.6.5" esphome compile living-room.yaml
