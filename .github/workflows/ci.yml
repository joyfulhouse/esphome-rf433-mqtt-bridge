name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Native scheduler + package contract tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Test
        run: uv run pytest -q

  esphome-config:
    name: ESPHome config validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Validate example configuration
        # The install instructions place the package, scheduler header, and the
        # per-device YAML in one directory; mirror that layout for validation
        # (ESPHome resolves `includes:` relative to the device YAML).
        run: |
          cp secrets.example.yaml secrets.yaml
          cp examples/living-room.yaml .
          sed -i 's|!include ../rf433-mqtt-bridge.yaml|!include rf433-mqtt-bridge.yaml|' living-room.yaml
          uvx --from "esphome==2026.6.5" esphome config living-room.yaml
