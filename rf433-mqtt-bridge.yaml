# Reusable Sonoff RF Bridge R2/Portisch MQTT beacon package.
#
# The bridge is a deliberately dumb MQTT/433.92 MHz adapter: it contains no
# device codes and no cover entities. A controller (for example the
# joyfulhouse/zemismart-blinds Home Assistant integration) publishes correlated
# JSON commands to rf433/<bridge_id>/tx; the beacon validates, schedules, and
# transmits Portisch B0 frames, acknowledging on rf433/<bridge_id>/status. A
# bounded onboarding sniff publishes accepted Portisch B1 captures to
# rf433/<bridge_id>/rx without ever feeding them into TX.
#
# Include this file from one small per-bridge YAML and override at least:
#   bridge_id, friendly_name, bridge_area, api_encryption_key, ota_password,
#   and your MQTT broker settings. Set default_bridge to "true" on exactly one
# beacon. See examples/living-room.yaml.
#
# Networking defaults to DHCP. To pin a static IP, add a wifi: block with
# manual_ip in your per-device YAML — ESPHome merges it over this package.
#
# MQTT is provider-agnostic: any broker works. With Home Assistant's Mosquitto
# add-on (the common core-mqtt setup) the broker is your HA host; a dedicated
# broker works the same way. Leave mqtt_username empty for anonymous brokers.

substitutions:
  bridge_id: rf433-bridge
  friendly_name: RF433 MQTT Bridge
  bridge_area: unassigned
  default_bridge: "false"
  listen_enabled: "false"
  mqtt_broker: homeassistant.local
  mqtt_port: "1883"
  mqtt_username: ""
  mqtt_password: ""
  default_repeats: "5"
  repeat_gap_ms: "35"
  api_encryption_key: REPLACE_WITH_32_BYTE_BASE64_KEY
  ota_password: REPLACE_WITH_OTA_PASSWORD

esphome:
  name: ${bridge_id}
  friendly_name: ${friendly_name}
  includes:
    - rf433_rx.h
    - rf433_scheduler.h
  on_boot:
    then:
      - lambda: |-
          id(boot_id) = esphome::random_uint32();

external_components:
  - source:
      type: local
      path: components
    components:
      - rf_bridge

esp8266:
  board: esp01_1m
  restore_from_flash: false

logger:
  # GPIO1/GPIO3 belong exclusively to the EFM8BB1 RF coprocessor.
  baud_rate: 0

uart:
  id: rf_uart
  tx_pin: GPIO1
  rx_pin: GPIO3
  baud_rate: 19200

rf_bridge:
  id: portisch_rf_bridge
  uart_id: rf_uart
  on_bucket_received:
    then:
      - lambda: |-
          const uint32_t captured_ms = millis();
          if (!rf433::rx_state().should_publish())
            return;
          // An RX observation is controller input only. It never enters the
          // scheduler, invokes the transmitter, or proves motor movement.
          if (!id(mqtt_client).publish_json("rf433/${bridge_id}/rx", [=](JsonObject root) {
                root["frame"] = data;
                root["t"] = captured_ms;
                root["boot"] = id(boot_id);
              }, 1, false)) {
            ESP_LOGW("rf433", "Failed to enqueue RX observation");
          }

# The per-bridge scheduler lives as a function-local static in
# rf433_scheduler.h (rf433::tx_scheduler), NOT an ESPHome `globals:` entry:
# ESPHome emits the globals pstorage before the `includes:` header, so a
# custom-typed global fails to compile. It keeps one state map per bridge and
# emits one RF frame at a time globally while preserving each target's repeat
# phase and absolute monotonic STOP deadline.

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # A Wi-Fi-loss reboot would drop the scheduler's RAM-held fail-safe STOPs: a
  # long timed move (stop_after_ms up to 3_600_000) can outlive the default
  # 15 min reboot_timeout, and the 5 ms tick dispatches STOPs over UART with no
  # need for connectivity. Disable the reboot to match api/mqtt so a transient
  # Wi-Fi drop never strands a blind mid-travel with its STOP unsent.
  reboot_timeout: 0s

api:
  reboot_timeout: 0s
  encryption:
    key: ${api_encryption_key}

ota:
  - platform: esphome
    password: ${ota_password}

mqtt:
  id: mqtt_client
  broker: ${mqtt_broker}
  port: ${mqtt_port}
  username: ${mqtt_username}
  password: ${mqtt_password}
  discovery: false
  # The bridge speaks ONLY the documented rf433/ contract: no ESPHome IP
  # discovery metadata, no retained debug log topic (it would leak the last
  # complete RF identity), and no auto component state/command topics. The only
  # broker-side RX control is the bounded /cmd sniff contract below.
  discover_ip: false
  log_topic:
  topic_prefix:
  # Kept disabled for the same STOP-safety reason as wifi's; prolonged MQTT
  # loss is instead handled by the scheduler-gated watchdog interval below.
  reboot_timeout: 0s
  birth_message:
    topic: rf433/${bridge_id}/availability
    payload: online
    qos: 0
    retain: true
  will_message:
    topic: rf433/${bridge_id}/availability
    payload: offline
    qos: 0
    retain: true
  shutdown_message:
    topic: rf433/${bridge_id}/availability
    payload: offline
    qos: 0
    retain: true
  # Retained info is published by the 5 ms dispatch tick the moment the client
  # is connected (see the interval lambda below), which also self-heals across
  # reconnects; a separate on_connect action and a periodic republish would
  # only duplicate that.
  on_json_message:
  - topic: rf433/${bridge_id}/tx
    qos: 1
    then:
      - lambda: |-
          const std::string command_id = x["command_id"].is<const char *>()
                                             ? x["command_id"].as<std::string>()
                                             : std::string();
          const std::string target = x["target"].is<const char *>()
                                         ? x["target"].as<std::string>()
                                         : std::string();
          auto publish_status = [&](const char *status, const std::string &reason) {
            id(mqtt_client).publish_json("rf433/${bridge_id}/status", [=](JsonObject root) {
              root["status"] = status;
              root["command_id"] = command_id;
              if (!reason.empty())
                root["reason"] = reason;
            }, 1, false);
          };
          auto reject = [&](const std::string &reason) {
            ESP_LOGW("rf433", "Rejected command %s for %s: %s", command_id.c_str(),
                     target.c_str(), reason.c_str());
            publish_status("rejected", reason);
          };

          // command_id and target are fully validated (parsed) inside
          // schedule(), which rejects on its own; only a cheap command_id shape
          // check is worth doing here before the costlier frame normalization
          // below. Re-parsing the target here would just waste cycles.
          if (!rf433::valid_key(command_id)) {
            reject("command_id is invalid");
            return;
          }

          // QoS-1 broker redelivery of an already-seen command replays the
          // original lifecycle idempotently. Rejecting an admitted duplicate
          // would tell a controller whose `accepted` was lost in an MQTT
          // hiccup that the command failed although its RF already moved the
          // motor; re-admitting a state-dependently rejected one would
          // transmit a command the controller was told failed. A replayed
          // `started` carries age_ms so the controller anchors its motion
          // model at the ORIGINAL RF handoff, not the redelivery time.
          uint32_t started_age_ms = 0;
          const uint32_t replay_ms = millis();
          const int replay =
              rf433::tx_scheduler(${repeat_gap_ms}).replay_state(command_id, replay_ms,
                                                                 started_age_ms);
          if (replay == 3) {
            reject("duplicate command_id (previously rejected)");
            return;
          }
          if (replay == 4) {
            // The original command was displaced after admission; replaying
            // accepted would let the controller rebuild a retired motion.
            publish_status("displaced", "");
            return;
          }
          if (replay > 0) {
            publish_status("accepted", "");
            if (replay == 2) {
              id(mqtt_client).publish_json("rf433/${bridge_id}/status", [=](JsonObject root) {
                root["status"] = "started";
                root["command_id"] = command_id;
                root["age_ms"] = started_age_ms;
                root["t"] = replay_ms;
                root["boot"] = id(boot_id);
              }, 1, false);
            }
            return;
          }

          if (!x["repeats"].isNull() && !x["repeats"].is<int>()) {
            reject("repeats must be an integer");
            return;
          }
          const int repeats = x["repeats"] | ${default_repeats};
          if (repeats < 1 || repeats > 20) {
            reject("repeats must be in the range 1..20");
            return;
          }
          if (!x["stop_after_ms"].isNull() && !x["stop_after_ms"].is<int>()) {
            reject("stop_after_ms must be an integer");
            return;
          }
          const int stop_after_ms = x["stop_after_ms"] | 0;
          if (stop_after_ms < 0 || stop_after_ms > 3600000) {
            reject("stop_after_ms must be in the range 0..3600000");
            return;
          }

          std::string raw;
          std::string trailer_raw;
          std::string stop_raw;
          std::string reason;
          // Read, type-check, and normalize one B0 frame field. raw is
          // required; trailer_raw and stop_raw are optional (absent -> empty).
          auto read_frame = [&](const char *key, bool required, std::string &out) -> bool {
            if (x[key].isNull()) {
              if (required)
                reject(std::string(key) + " must be a B0 string");
              return !required;
            }
            if (!x[key].is<const char *>()) {
              reject(std::string(key) + " must be a B0 string");
              return false;
            }
            const char *raw_value = x[key].as<const char *>();
            if (strlen(raw_value) > rf433::MAX_B0_INPUT_CHARS) {
              // Bound the untrusted field length BEFORE materializing it as an
              // owning std::string, so a padded hostile value cannot force a
              // large pre-validation heap copy on the ESP8285 (normalize_b0's
              // own guard only bounds its reserve, after this copy would exist).
              reject(std::string(key) + " exceeds the maximum size");
              return false;
            }
            const std::string value = raw_value;
            if (value.empty()) {
              // An explicitly empty optional field means "absent".
              if (required)
                reject(std::string(key) + " must be a B0 string");
              return !required;
            }
            if (!rf433::normalize_b0(value, out, reason)) {
              reject(std::string("invalid ") + key + ": " + reason);
              return false;
            }
            return true;
          };
          if (!read_frame("raw", true, raw))
            return;
          if (!read_frame("trailer_raw", false, trailer_raw))
            return;
          if (!read_frame("stop_raw", false, stop_raw))
            return;
          if (stop_after_ms > 0 && stop_raw.empty()) {
            reject("timed command requires stop_raw");
            return;
          }
          if (!stop_raw.empty() && stop_after_ms == 0) {
            // An armed-looking STOP the caller cannot trigger: reject rather
            // than silently accept a stop_raw that will never fire.
            reject("stop_raw requires stop_after_ms");
            return;
          }

          // Latest command wins: overlapping active targets on the same
          // remote are displaced (their pending fail-safe STOPs are flushed
          // on air first). Each displaced command_id is reported so the
          // controller can retire its motion model.
          std::vector<std::string> displaced_ids;
          std::string schedule_reason;
          if (!rf433::tx_scheduler(${repeat_gap_ms})
                   .schedule(command_id, target, raw, trailer_raw, repeats,
                             static_cast<uint32_t>(stop_after_ms), stop_raw, millis(),
                             displaced_ids, schedule_reason)) {
            reject(schedule_reason);
            return;
          }
          // `displaced` is published now, at admission of the replacing
          // command, but the displaced command's flushed fail-safe STOP
          // physically transmits over the next pacing gap(s) (~${repeat_gap_ms}
          // ms each). A controller that freezes its motion model at
          // displaced-time is within one pacing gap of the physical truth.
          for (const std::string &displaced_id : displaced_ids) {
            id(mqtt_client).publish_json("rf433/${bridge_id}/status", [=](JsonObject root) {
              root["status"] = "displaced";
              root["command_id"] = displaced_id;
            }, 1, false);
          }
          publish_status("accepted", "");

  - topic: rf433/${bridge_id}/cmd
    qos: 1
    then:
      - lambda: |-
          if (!x["action"].is<const char *>()) {
            ESP_LOGW("rf433", "Rejected RX command: action must be a string");
            return;
          }
          const std::string action = x["action"].as<std::string>();
          if (action == "disarm") {
            const std::string command_id = x["command_id"].is<const char *>()
                                               ? x["command_id"].as<std::string>()
                                               : std::string();
            if (!rf433::valid_key(command_id)) {
              ESP_LOGW("rf433", "Rejected disarm command: command_id is invalid");
              return;
            }
            rf433::tx_scheduler(${repeat_gap_ms}).disarm(command_id);
            const uint32_t status_ms = millis();
            id(mqtt_client).publish_json("rf433/${bridge_id}/status", [=](JsonObject root) {
              root["status"] = "disarmed";
              root["command_id"] = command_id;
              root["t"] = status_ms;
              root["boot"] = id(boot_id);
            }, 1, false);
            return;
          }
          const bool seconds_is_integer = x["seconds"].is<int>();
          const auto command = rf433::validate_rx_command(
              action, seconds_is_integer, seconds_is_integer ? x["seconds"].as<int>() : 0);
          if (command.action == rf433::RxCommandAction::INVALID) {
            ESP_LOGW("rf433", "Rejected RX command %s: %s", action.c_str(), command.error);
            return;
          }

          const uint32_t now_ms = millis();
          if (!rf433::rx_state().command_allowed(now_ms, command)) {
            ESP_LOGW("rf433", "Rejected rate-limited RX command");
            return;
          }
          rf433::rx_state().start_sniff(command.seconds, now_ms);
          if (command.seconds == 0) {
            ESP_LOGI("rf433", "Bucket sniffing cancelled");
          } else {
            ESP_LOGI("rf433", "Bucket sniffing active for up to %u seconds", command.seconds);
          }

globals:
  - id: boot_id
    type: uint32_t
    initial_value: "0"
  - id: next_info_ms
    type: uint32_t
    initial_value: "0"

interval:
  - interval: 5ms
    then:
      - lambda: |-
          // Publish retained info from the dispatch tick, in one place. A
          // plain on_connect publish has been observed to drop in the field
          // (fleet-wide, ESPHome 2026.6.5 — the client is not yet writable
          // when that trigger fires), silently degrading controllers'
          // area-aware bridge selection. Publishing the moment the client is
          // ready fixes that, and republishing at most once a minute repairs
          // retained metadata lost while the connection stays up (a broker
          // that drops retained state without disconnecting). next_info_ms is
          // advanced only when publish() succeeds, so a failed publish retries
          // on the next tick rather than being suppressed for a minute.
          const uint32_t now_ms = millis();
          auto &sched = rf433::tx_scheduler(${repeat_gap_ms});
          auto &rx = rf433::rx_state();
          rx.tick(now_ms);
          const bool busy = !sched.idle() || !sched.rf_air_clear(now_ms);
          const bool desired = !busy && rx.wants_sniff(now_ms, ${listen_enabled});
          if (desired != rx.radio_sniffing()) {
            if (desired) {
              id(portisch_rf_bridge).start_bucket_sniffing();
              rx.note_radio_armed(now_ms);
            } else {
              id(portisch_rf_bridge).stop_advanced_sniffing();
            }
            rx.set_radio_sniffing(desired);
          } else if (desired && rx.keepalive_due(now_ms) &&
                     id(portisch_rf_bridge).receive_idle()) {
            // Portisch silently reverts to standard sniffing when a host ACK
            // or an EFM8 watchdog reset re-arms its stale
            // last_sniffing_command (RF_CODE_RFIN after the B1 command
            // handler). The vendored component no longer ACKs deliveries,
            // and this idempotent B1 re-arm bounds any remaining silent
            // fallback to one keepalive period. Gated on transport quiet so
            // a capture mid-delivery is never clipped.
            id(portisch_rf_bridge).start_bucket_sniffing();
            rx.note_radio_armed(now_ms);
          }
          if (!id(mqtt_client).is_connected()) {
            // Hold the timer due so the first tick after a reconnect
            // republishes retained info immediately.
            id(next_info_ms) = now_ms;
          } else if (static_cast<int32_t>(now_ms - id(next_info_ms)) >= 0 &&
                     id(mqtt_client).publish_json("rf433/${bridge_id}/info", [=](JsonObject root) {
                       root["bridge"] = "${bridge_id}";
                       root["area"] = "${bridge_area}";
                       root["default"] = ${default_bridge};
                       root["boot"] = id(boot_id);
                       root["listen"] = ${listen_enabled};
                       root["v"] = 2;
                     }, 0, true)) {
            id(next_info_ms) = now_ms + 60000;
          }
          std::string started_command_id;
          const uint32_t dispatch_ms = millis();
          const auto raw = sched.next(dispatch_ms, started_command_id);
          if (!raw.has_value())
            return;
          id(portisch_rf_bridge).send_raw(*raw);
          if (started_command_id.empty())
            return;
          // `started` means this frame was handed to the RF coprocessor over
          // UART. ESPHome's rf_bridge send_raw does not wait for an EFM8BB1
          // ack, so `started` is proof of dispatch, not of RF emission.
          const uint32_t status_ms = millis();
          auto publish_status = [&](const char *status, const std::string &command_id) {
            id(mqtt_client).publish_json("rf433/${bridge_id}/status", [=](JsonObject root) {
              root["status"] = status;
              root["command_id"] = command_id;
              root["age_ms"] = status_ms - dispatch_ms;
              root["t"] = status_ms;
              root["boot"] = id(boot_id);
            }, 1, false);
          };
          publish_status("started", started_command_id);
  - interval: 10s
    then:
      - lambda: |-
          // MQTT-outage watchdog. The stock mqtt/wifi reboot_timeout stays 0s
          // because an unconditional reboot drops the scheduler's RAM-held
          // fail-safe STOP deadlines. This gated variant reboots only when the
          // scheduler is idle and the air is clear, which is always eventually
          // true during an outage: commands arrive over MQTT, so a
          // disconnected bridge can only drain. Field incident 2026-07-19: a
          // bridge sat unreachable for 12 h retrying against a stale
          // LB-conntrack tuple; a reboot (fresh TCP source ports) recovered it
          // in seconds.
          static uint32_t mqtt_ok_ms = millis();
          const uint32_t now_ms = millis();
          if (id(mqtt_client).is_connected()) {
            mqtt_ok_ms = now_ms;
            return;
          }
          if (static_cast<int32_t>(now_ms - mqtt_ok_ms) < 15 * 60 * 1000)
            return;
          auto &sched = rf433::tx_scheduler(${repeat_gap_ms});
          if (!sched.idle() || !sched.rf_air_clear(now_ms))
            return;
          ESP_LOGW("watchdog", "MQTT unreachable for 15 min with idle scheduler; rebooting");
          App.safe_reboot();
