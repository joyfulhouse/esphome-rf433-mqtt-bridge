# Example per-device file for one Sonoff RF Bridge R2.
# Copy this next to rf433-mqtt-bridge.yaml, rf433_scheduler.h, and rf433_rx.h;
# copy the local components/ directory alongside them without flattening it:
#
#   living-room.yaml              components/
#   rf433-mqtt-bridge.yaml          rf_bridge/
#   rf433_scheduler.h
#   rf433_rx.h
#
# Adjust the substitutions, then flash:
#
#   esphome run living-room.yaml
#
# Networking uses DHCP by default. To pin a static IP instead, uncomment the
# wifi: block below (RFC 5737 documentation addresses shown — use your own).

substitutions:
  bridge_id: rf433-bridge-living-room
  friendly_name: Living Room RF Bridge
  bridge_area: living_room     # Home Assistant area ID, not its display name
  default_bridge: "true"       # "true" on exactly one bridge in your home
  listen_enabled: "false"
  # With Home Assistant's Mosquitto add-on, the broker is your HA host.
  mqtt_broker: homeassistant.local
  mqtt_username: !secret mqtt_username
  mqtt_password: !secret mqtt_password
  api_encryption_key: !secret rf433_bridge_living_room_api_key
  ota_password: !secret rf433_bridge_living_room_ota_password

# This file, both headers, rf433-mqtt-bridge.yaml, and components/ share one
# config root (see README install step 1); the package include is same-dir.
packages:
  rf433_bridge: !include rf433-mqtt-bridge.yaml

