# Copy to secrets.yaml and fill in your own values. Never commit secrets.yaml.
wifi_ssid: "YOUR_WIFI_SSID"
wifi_password: "YOUR_WIFI_PASSWORD"

# MQTT credentials for the broker the bridge should use. With Home Assistant's
# Mosquitto add-on, create a dedicated HA user for the bridges. Leave both
# empty in your device YAML for anonymous brokers.
mqtt_username: "rf433-bridge"
mqtt_password: "YOUR_MQTT_PASSWORD"

# Per-device ESPHome native API key (32-byte base64; generate your own with
# `openssl rand -base64 32` — the all-zeros value below is a placeholder that
# only exists so `esphome config` validates) and OTA password.
rf433_bridge_living_room_api_key: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
rf433_bridge_living_room_ota_password: "REPLACE_WITH_OTA_PASSWORD"
